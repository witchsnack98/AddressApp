services:
  postgres:
    image: postgres:16-alpine
    container_name: addressapp-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: addressapp
      POSTGRES_PASSWORD: addressapp_secret
      POSTGRES_DB: addressapp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U addressapp -d addressapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
